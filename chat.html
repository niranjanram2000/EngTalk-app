<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>engTalk Chat</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f2f3f5;
    }

    .chat-container {
      max-width: 480px;
      height: 100vh;
      margin: auto;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      border-radius: 0 0 20px 20px;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px;
      background: #4b7bec;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .chat-header .user-info {
      display: flex;
      flex-direction: column;
    }

    .chat-header .user-info .name {
      font-weight: bold;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .message {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 20px;
      line-height: 1.4;
      position: relative;
      font-size: 14px;
    }

    .message.sent {
      background: #d1eaff;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .message.received {
      background: #e9ecef;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    .chat-input {
      padding: 12px;
      display: flex;
      gap: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 15px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    .chat-input button {
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      background: #4b7bec;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .chat-input button:hover {
      background: #3867d6;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <img src="https://i.pravatar.cc/150?img=3" alt="Profile" />
      <div class="user-info">
        <span class="name">Zozit</span>
        <span style="font-size: 12px;">Online</span>
      </div>
    </div>
    <div class="chat-messages">
      <div class="message received">Hey Niranjan! How’s your day?</div>
      <div class="message sent">Hey Zozit! Pretty good. Just working on a cool project 😎</div>
      <div class="message received">Wow! Tell me more!</div>
    </div>
    <div class="chat-input">
      <input type="text" placeholder="Type a message..." />
      <button>Send</button>
    </div>
  </div>
</body>
</html>
